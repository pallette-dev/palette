# Changesets release automation:
# - If there are open changesets (.changeset/*.md), opens a PR that bumps versions + changelogs.
# - After that PR is merged (no remaining changesets), runs publish to npm.
#
# Requirements:
# - Repo secret NPM_TOKEN: npm automation token with publish access to your scope(s).
# - Publishable packages use publishConfig.access public; eslint-config and typescript-config stay private.
# - Keep .changeset/config.json "baseBranch" aligned with your default branch (currently main).
#
# Docs: https://github.com/changesets/action

name: Release

on:
  push:
    branches:
      - main
      - master

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
