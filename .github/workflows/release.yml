# Changesets release automation:
# - If there are open changesets (.changeset/*.md), opens a PR that bumps versions + changelogs.
# - After that PR is merged (no remaining changesets), runs publish to npm.
#
# Requirements:
# - Repo secret NPM_TOKEN: npm automation token with publish access to your scope(s).
# - GitHub must allow this workflow to open PRs (version-packages PR):
#   Settings → Actions → General → Workflow permissions: “Read and write”.
#   Enable “Allow GitHub Actions to create and approve pull requests”.
#   https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/enabling-features-for-your-repository/managing-github-actions-settings-for-a-repository
#   If your org forbids that, add repo secret CHANGESETS_GITHUB_TOKEN (fine-grained or classic PAT
#   with contents + pull-requests write on this repo) — see env on the changesets step below.
# - Publishable packages use publishConfig.access public; eslint-config and typescript-config stay private.
# - Keep .changeset/config.json "baseBranch" aligned with your default branch (currently main).
#
# Docs: https://github.com/changesets/action

name: Release

# Use Node 24 for Actions’ internal Node (checkout, pnpm/setup, etc.); see GitHub’s Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Default token permissions for jobs that don’t set their own (included for clarity).
permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # No `version` here — read pnpm from packageManager (avoids clashing with packageManager: pnpm@9.0.0).
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # PAT secret optional when repo/org blocks GITHUB_TOKEN from creating PRs; see header comment.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
